<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BusyTraderApp</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
  text-align: center;
}

.container {
  padding: 50px 20px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  margin-bottom: 40px;
}

.card {
  background: #111;
  padding: 25px;
  border-radius: 12px;
  max-width: 400px;
  margin: 20px auto;
}

input {
  padding: 12px;
  width: 100%;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  width: 100%;
  background: gold;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.result {
  margin-top: 10px;
  font-size: 18px;
  color: #00ff99;
}

.cta {
  margin-top: 40px;
}

.cta a {
  display: inline-block;
  padding: 15px 25px;
  background: #0088cc;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
}

.cta a:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="container">

<h1>BusyTraderApp 📈</h1>
<p class="subtitle">Precision Nasdaq Execution Tools</p>

<!-- RISK CALCULATOR -->
<div class="card">
  <h2>Risk Calculator</h2>
  <input type="number" id="balance" placeholder="Account Balance ($)">
  <input type="number" id="risk" placeholder="Risk % per trade">
  <button onclick="calcRisk()">Calculate</button>
  <div class="result" id="riskResult"></div>
</div>

<!-- COMPOUNDING CALCULATOR -->
<div class="card">
  <h2>Compounding Calculator</h2>
  <input type="number" id="start" placeholder="Starting Balance ($)">
  <input type="number" id="daily" placeholder="Daily Growth %">
  <input type="number" id="days" placeholder="Number of Days">
  <button onclick="calcCompound()">Calculate</button>
  <div class="result" id="compoundResult"></div>
</div>

<!-- CTA -->
<div class="cta">
  <p>Join traders scaling Nasdaq daily 🚀</p>
  <a href="https://t.me/YOUR_LINK_HERE" target="_blank">
    Join Telegram
  </a>
</div>

</div>

<script>
function calcRisk() {
  let balance = document.getElementById("balance").value;
  let risk = document.getElementById("risk").value;

  if (!balance || !risk) {
    document.getElementById("riskResult").innerText = "Enter values";
    return;
  }

  let result = (balance * risk / 100).toFixed(2);

  document.getElementById("riskResult").innerText =
    "Risk per trade: $" + result;
}

function calcCompound() {
  let start = document.getElementById("start").value;
  let daily = document.getElementById("daily").value;
  let days = document.getElementById("days").value;

  if (!start || !daily || !days) {
    document.getElementById("compoundResult").innerText = "Enter values";
    return;
  }

  let final = start * Math.pow((1 + daily / 100), days);

  document.getElementById("compoundResult").innerText =
    "Final Balance: $" + final.toFixed(2);
}
</script>

</body>
</html>
