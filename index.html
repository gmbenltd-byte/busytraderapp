<!DOCTYPE html>
<html>
<head>
  <title>BusyTraderApp | NAS100 Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 40px;
    }

    input {
      padding: 12px;
      width: 250px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px 25px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>NAS100 Lot Size & Risk Calculator</h1>
  <p>Calculate lot size, risk, and profit in seconds</p>

  <input id="balance" placeholder="Account Balance (£)" /><br>
  <input id="risk" placeholder="Risk %" /><br>
  <input id="sl" placeholder="Stop Loss (points)" /><br>

  <button onclick="calculate()">Calculate</button>

  <h3 id="result"></h3>

  <script>
    function calculate() {
      let balance = Number(document.getElementById("balance").value || 0);
      let risk = Number(document.getElementById("risk").value || 0);
      let sl = Number(document.getElementById("sl").value || 0);

      if (sl <= 0) {
        document.getElementById("result").innerHTML = "Enter a valid stop loss";
        return;
      }

      let riskAmount = balance * (risk / 100);
      let lotSize = riskAmount / sl;

      document.getElementById("result").innerHTML =
        "Lot Size: " + lotSize.toFixed(2) +
        " | Risk: £" + riskAmount.toFixed(2);
    }
  </script>

</body>
</html>
